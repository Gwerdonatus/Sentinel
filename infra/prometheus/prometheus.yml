---
# =============================================================================
# Sentinel Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: sentinel
    environment: development

# Alert rules (Phase 3+)
# rule_files:
#   - /etc/prometheus/rules/*.yml

scrape_configs:

  # Django backend — django-prometheus exposes /metrics
  - job_name: "sentinel-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # Celery worker metrics via Flower API (Phase 2+)
  # - job_name: "sentinel-celery"
  #   static_configs:
  #     - targets: ["flower:5555"]
  #   metrics_path: /metrics

  # PostgreSQL exporter (Phase 2+)
  # - job_name: "postgresql"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Redis exporter (Phase 2+)
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # OpenTelemetry Collector self-metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
