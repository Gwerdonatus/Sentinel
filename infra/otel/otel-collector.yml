---
# =============================================================================
# OpenTelemetry Collector Configuration
# =============================================================================
# Receives traces from the Sentinel backend and worker.
# Exports to Jaeger for distributed trace visualization.
# Also exports metrics to Prometheus.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  # Log traces to stdout in development (for debugging)
  logging:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

  # Prometheus exporter for trace-derived metrics (future)
  prometheus:
    endpoint: "0.0.0.0:8889"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [logging]
    
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
